spring:
  application:
    name: customer-support-hub
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/support_hub?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${DB_USER:support}
    password: ${DB_PASSWORD:support}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

# --- Application-specific configuration ---
app:
  # JWT signing/validation. HS256 symmetric secret. MUST be overridden in production via JWT_SECRET.
  # Minimum 32 bytes (256 bits) for HS256.
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-is-a-dev-only-secret-please-rotate}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}
  # Bootstrap admin, created on startup if absent. Override in real deployments.
  seed:
    admin:
      username: ${SEED_ADMIN_USERNAME:admin}
      password: ${SEED_ADMIN_PASSWORD:admin}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.springframework.security: INFO
